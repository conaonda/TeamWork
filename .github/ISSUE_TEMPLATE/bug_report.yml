name: 버그 리포트
description: 버그를 발견했을 때 사용하세요
title: "[Bug] "
labels: ["type/bug"]
body:
  - type: markdown
    attributes:
      value: 버그 리포트를 작성해 주세요.
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 간단히 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      description: 버그를 재현할 수 있는 단계를 작성해 주세요.
      placeholder: |
        1. '...'로 이동
        2. '...'을 클릭
        3. 에러 발생
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작해야 하는 방식을 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 발생한 동작을 설명해 주세요.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경 정보
      description: OS, 브라우저, 버전 등
      placeholder: |
        - OS: macOS 14
        - Browser: Chrome 120
        - Node: 20.x
