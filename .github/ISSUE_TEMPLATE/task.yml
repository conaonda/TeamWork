name: 태스크
description: 일반 작업 항목을 등록할 때 사용하세요
title: "[Task] "
labels: ["type/task"]
body:
  - type: textarea
    id: description
    attributes:
      label: 작업 설명
      description: 수행할 작업을 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      description: 세부 작업 항목을 나열해 주세요.
      placeholder: |
        - [ ] 항목 1
        - [ ] 항목 2
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
